<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude Orchestrator</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css">
</head>
<body>
    <div id="app">
        <header>
            <h1>Claude Orchestrator</h1>
            <div class="status-bar">
                <span id="connection-status" class="status-indicator">Disconnected</span>
                <button id="connect-btn">Connect to Server</button>
            </div>
        </header>
        
        <main class="terminal-grid">
            <!-- Claude terminals (8) -->
            <div class="terminal-section claude-terminals">
                <h2>Claude Sessions</h2>
                <div class="terminals" id="claude-terminals">
                    <!-- Terminal instances will be created dynamically -->
                </div>
            </div>
            
            <!-- Server terminals (8) -->
            <div class="terminal-section server-terminals">
                <h2>Server Sessions</h2>
                <div class="terminals" id="server-terminals">
                    <!-- Terminal instances will be created dynamically -->
                </div>
            </div>
        </main>
        
        <footer>
            <div class="controls">
                <button id="start-all-claude">Start All Claude</button>
                <button id="stop-all-claude">Stop All Claude</button>
                <button id="start-all-servers">Start All Servers</button>
                <button id="stop-all-servers">Stop All Servers</button>
            </div>
        </footer>
    </div>
    
    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
    <script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
    <script type="module" src="app.js"></script>
</body>
</html>
