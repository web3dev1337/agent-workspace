<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agent Workspace</title>
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial,
          "Apple Color Emoji", "Segoe UI Emoji";
        background: #0b0f16;
        color: rgba(255, 255, 255, 0.92);
        display: grid;
        place-items: center;
        height: 100vh;
      }
      .card {
        width: min(720px, calc(100vw - 48px));
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(255, 255, 255, 0.06);
        border-radius: 14px;
        padding: 18px 18px 16px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
      }
      h1 {
        font-size: 18px;
        margin: 0 0 8px;
        font-weight: 650;
      }
      p {
        margin: 0;
        opacity: 0.85;
        line-height: 1.5;
      }
      .hint {
        margin-top: 12px;
        opacity: 0.7;
        font-size: 12.5px;
      }
      pre {
        margin: 12px 0 0;
        padding: 10px 12px;
        border-radius: 12px;
        background: rgba(0, 0, 0, 0.28);
        border: 1px solid rgba(255, 255, 255, 0.1);
        overflow: auto;
        max-height: 220px;
        font-size: 12px;
        line-height: 1.45;
        opacity: 0.9;
      }
      .hidden {
        display: none;
      }
      code {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono",
          "Courier New", monospace;
        background: rgba(255, 255, 255, 0.08);
        padding: 2px 6px;
        border-radius: 8px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1 id="bootstrap-title">Starting Agent Workspace…</h1>
      <p id="bootstrap-message">Launching the local backend and connecting to your workspace.</p>
      <pre id="bootstrap-details" class="hidden"></pre>
      <p class="hint" id="bootstrap-hint">
        If this screen doesn’t advance within ~20 seconds, ensure
        <a href="https://nodejs.org" target="_blank">Node.js</a> is installed on your system.
      </p>
    </div>

    <script>
      window.__orchestrator_bootstrap_error = function (title, message, details, hint) {
        try {
          const titleEl = document.getElementById('bootstrap-title');
          const msgEl = document.getElementById('bootstrap-message');
          const detailsEl = document.getElementById('bootstrap-details');
          const hintEl = document.getElementById('bootstrap-hint');

          if (titleEl) titleEl.textContent = title || 'Failed to start';
          if (msgEl) msgEl.textContent = message || 'The backend did not start.';
          if (detailsEl) {
            if (details) {
              detailsEl.textContent = String(details);
              detailsEl.classList.remove('hidden');
            } else {
              detailsEl.textContent = '';
              detailsEl.classList.add('hidden');
            }
          }
          if (hintEl) {
            hintEl.innerHTML = hint
              ? String(hint)
              : 'Check logs in <code>ORCHESTRATOR_DATA_DIR</code> (look for <code>logs/combined.log</code>).';
          }
        } catch (e) {
          console.error(e);
        }
      };
    </script>
  </body>
</html>
