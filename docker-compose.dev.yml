version: '3.8'

services:
  orchestrator-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "4000:4000"  # Server
      - "2081:2081"  # Client
      - "1421:1421"  # Tauri
    volumes:
      # Mount source code for live development
      - .:/app
      - /app/node_modules  # Exclude node_modules
      # Share HyFire2 worktrees (read-only to be safe)
      - ~/HyFire2:/home/node/HyFire2:ro
    environment:
      - WORKTREE_BASE_PATH=/home/node/HyFire2
      - WORKTREE_COUNT=8
      - NODE_ENV=development
    restart: unless-stopped
    container_name: claude-orchestrator-dev