name: gitleaks

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan
        uses: gitleaks/gitleaks-action@v2
        with:
          args: detect --redact --no-banner
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

