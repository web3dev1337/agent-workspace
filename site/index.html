<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Workspace</title>
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --base-bg: #030305;
      --cyan: #00e5ff;
      --blue-deep: #2563eb;
      --indigo: #4f46e5;
      --text-main: #ffffff;
      --font-sans: 'Outfit', sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { background-color: var(--base-bg); }
    body {
      font-family: var(--font-sans);
      color: var(--text-main);
      min-height: 100vh;
      overflow: hidden;
    }
    #neural-bg {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      z-index: -2;
      pointer-events: none;
    }
    .ambient-lights {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      z-index: -1;
      overflow: hidden;
      pointer-events: none;
    }
    .light {
      position: absolute;
      width: 800px; height: 800px;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.15;
      animation: floatLight 20s infinite alternate cubic-bezier(0.4, 0, 0.2, 1);
    }
    .light.cyan { background: var(--cyan); top: -20%; left: -10%; }
    .light.blue-deep { background: var(--blue-deep); bottom: -20%; right: -10%; animation-delay: -5s; }
    .light.indigo { background: var(--indigo); top: 40%; left: 50%; animation-delay: -10s; width: 600px; height: 600px; opacity: 0.1; }
    @keyframes floatLight {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(10%, 10%) scale(1.2); }
    }

    /* Title - fixed center */
    .mega-title {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) translateY(60px) scale(0.9);
      font-size: clamp(5.5rem, 12vw, 13rem);
      font-weight: 900;
      letter-spacing: -0.03em;
      text-align: center;
      line-height: 1.05;
      white-space: nowrap;
      opacity: 0;
      filter: blur(10px);
      transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1),
                  transform 0.8s cubic-bezier(0.16, 1, 0.3, 1),
                  filter 0.8s cubic-bezier(0.16, 1, 0.3, 1);
      z-index: 2;
    }
    .mega-title.visible {
      opacity: 1;
      transform: translate(-50%, -50%) translateY(0) scale(1);
      filter: blur(0);
    }
    .mega-title.fade-out {
      opacity: 0;
      transform: translate(-50%, -50%) translateY(-30px) scale(0.95);
      filter: blur(10px);
      transition-duration: 0.8s;
    }

    /* Video container - handles centering */
    .trailer-container {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 1;
      max-width: 85vw;
      max-height: 80vh;
    }

    /* Video - handles zoom/fade */
    .trailer-video {
      display: block;
      max-width: 85vw;
      max-height: 80vh;
      border-radius: 12px;
      opacity: 0;
      filter: blur(5px);
      transform: scale(0.95);
      transform-origin: center center;
      transition: opacity 0.8s ease, transform 1s cubic-bezier(0.16, 1, 0.3, 1), filter 0.8s ease, transform-origin 1s ease;
      box-shadow: 0 0 80px rgba(0, 0, 0, 0.9);
    }
    .trailer-video.visible {
      opacity: 1;
      transform: scale(1);
      filter: blur(0);
    }

    /* Zoomed state */
    .trailer-video.zoomed {
      transform: scale(1.15);
    }

    /* End card */
    .end-card {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) translateY(40px) scale(0.9);
      font-size: clamp(4rem, 8vw, 9rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      text-align: center;
      line-height: 1.2;
      opacity: 0;
      filter: blur(10px);
      z-index: 3;
      transition: opacity 1s cubic-bezier(0.16, 1, 0.3, 1),
                  transform 1s cubic-bezier(0.16, 1, 0.3, 1),
                  filter 1s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .end-card.visible {
      opacity: 1;
      transform: translate(-50%, -50%) translateY(0) scale(1);
      filter: blur(0);
    }

    .gradient-text {
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      color: transparent;
    }
    .multi-color {
      background-image: linear-gradient(90deg, var(--cyan), var(--blue-deep), #ec4899, #fff, #fff, #fff);
      background-size: 400% 100%;
      background-position: 100% 0%;
      animation: gradientSwipeLTR 2.5s ease-out 3s forwards;
    }
    @keyframes gradientSwipeLTR {
      0% { background-position: 100% 0%; }
      100% { background-position: 0% 0%; }
    }
    .multi-color-end {
      background-image: linear-gradient(90deg, var(--cyan), var(--blue-deep), #ec4899, #fff, #fff, #fff);
      background-size: 400% 100%;
      background-position: 100% 0%;
    }
    .multi-color-end.sweep {
      animation: gradientSwipeLTR 2.5s ease-out forwards;
    }

    /* Site viewport - clips the content */
    .site-viewport {
      position: fixed;
      top: 0; left: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      z-index: 10;
      opacity: 0;
      pointer-events: none;
      transition: opacity 1.5s ease;
    }
    .site-viewport.visible {
      opacity: 1;
    }

    /* The actual site content slides up inside the viewport */
    .site-scroll-content {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      transition: transform 6s cubic-bezier(0.3, 0, 0.7, 1);
    }
    .site-scroll-content.scrolling {
      transform: translateY(var(--scroll-distance));
    }

    /* Floating logos */
    .float-logo {
      position: fixed;
      width: 120px;
      height: 120px;
      object-fit: contain;
      pointer-events: none;
      z-index: 0;
      opacity: 0;
    }

    .float-logo.claude-drift {
      left: -10%;
      top: 50%;
      opacity: 1;
      animation: driftClaude 3.1s linear forwards, spin 3s linear infinite;
    }
    .float-logo.openai-drift {
      left: 110%;
      top: 50%;
      opacity: 1;
      filter: brightness(0) invert(1);
      animation: driftOpenAI 3.1s linear forwards, spinReverse 2.5s linear infinite;
    }

    @keyframes driftClaude {
      0%   { left: -10%; top: 50%; opacity: 1; }
      80%  { opacity: 1; }
      100% { left: 30%; top: 10%; opacity: 0; }
    }

    @keyframes driftOpenAI {
      0%   { left: 110%; top: 50%; opacity: 1; }
      80%  { opacity: 1; }
      100% { left: 70%; top: 90%; opacity: 0; }
    }

    @keyframes spin {
      from { transform: translate(-50%, -50%) rotate(0deg); }
      to   { transform: translate(-50%, -50%) rotate(360deg); }
    }

    @keyframes spinReverse {
      from { transform: translate(-50%, -50%) rotate(0deg); }
      to   { transform: translate(-50%, -50%) rotate(-360deg); }
    }

    /* Brand finale */
    .brand-finale {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 100;
      display: flex;
      align-items: center;
      opacity: 0;
      transition: opacity 0.8s ease;
    }
    .brand-finale.visible { opacity: 1; }
    .finale-orb-wrap {
      flex-shrink: 0;
    }
    .brand-finale .finale-orb {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      background: conic-gradient(from 180deg at 50% 50%, var(--cyan) 0deg, var(--blue-deep) 180deg, var(--cyan) 360deg);
      box-shadow: 0 0 30px var(--cyan), 0 0 60px rgba(0, 229, 255, 0.4);
      animation: orbSpin 4s linear infinite;
    }
    @keyframes orbSpin { to { transform: rotate(360deg); } }

    /* Play button */
    .play-btn {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 200;
      width: 120px; height: 120px;
      border-radius: 50%;
      border: 3px solid rgba(255,255,255,0.3);
      background: rgba(255,255,255,0.05);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.5s ease, transform 0.3s ease;
      backdrop-filter: blur(4px);
    }
    .play-btn:hover { transform: translate(-50%, -50%) scale(1.1); border-color: var(--cyan); }
    .play-btn::after {
      content: '';
      display: block;
      width: 0; height: 0;
      border-style: solid;
      border-width: 20px 0 20px 35px;
      border-color: transparent transparent transparent #fff;
      margin-left: 5px;
    }
    .play-btn.hidden { opacity: 0; pointer-events: none; }

    /* Countdown */
    .countdown {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 200;
      font-size: 8rem;
      font-weight: 900;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    .countdown.visible { opacity: 1; }

    /* Fade to black at end */
    .fade-to-black {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      background: #000;
      z-index: 9999;
      opacity: 0;
      pointer-events: none;
      transition: opacity 2s ease;
    }
    .fade-to-black.visible { opacity: 1; }

    .brand-finale .finale-text {
      font-size: 9rem;
      font-weight: 900;
      letter-spacing: -0.03em;
      white-space: nowrap;
      overflow: hidden;
      max-width: 0;
      opacity: 0;
      transition: max-width 1.2s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.8s ease;
    }
    .brand-finale.expanded .finale-text {
      max-width: 1200px;
      opacity: 1;
      margin-left: 2rem;
    }
    .finale-subtitle {
      position: fixed;
      left: 50%;
      top: 62%;
      transform: translateX(-50%);
      z-index: 100;
      text-align: center;
      opacity: 0;
      transition: opacity 1.2s ease, transform 1.2s cubic-bezier(0.16, 1, 0.3, 1);
      transform: translateX(-50%) translateY(20px);
    }
    .finale-subtitle.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    .finale-subtitle .sub-text {
      font-size: 4rem;
      font-weight: 900;
      letter-spacing: -0.02em;
      background: linear-gradient(90deg, #fff 20%, var(--cyan) 40%, #ec4899 60%, #2563eb 80%, #fff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      background-size: 200% 100%;
      animation: subtleShimmer 3s ease-in-out infinite alternate;
      filter: drop-shadow(0 0 8px rgba(0, 229, 255, 0.3));
    }
    @keyframes subtleShimmer {
      0% { background-position: 0% 50%; }
      100% { background-position: 100% 50%; }
    }
    .finale-subtitle .sub-link {
      display: block;
      margin-top: 1rem;
      font-size: 3rem;
      font-weight: 900;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      background: linear-gradient(90deg, #00e5ff, #2563eb, #ec4899, #fff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      background-size: 300% 100%;
      animation: linkPulse 2s ease-in-out infinite alternate;
    }
    @keyframes linkPulse {
      0% { background-position: 0% 50%; filter: brightness(1); }
      100% { background-position: 100% 50%; filter: brightness(1.3); }
    }
    .finale-subtitle .sub-arrow {
      display: block;
      margin-top: 1.5rem;
      font-size: 4.5rem;
      animation: bounceDown 1s ease-in-out infinite;
      filter: drop-shadow(0 0 15px rgba(0, 229, 255, 0.5));
    }
    @keyframes bounceDown {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(15px); }
    }
  </style>
</head>
<body>
  <canvas id="neural-bg"></canvas>
  <div class="ambient-lights">
    <div class="light cyan"></div>
    <div class="light blue-deep"></div>
    <div class="light indigo"></div>
  </div>
  <div class="play-btn" id="play-btn"></div>
  <div class="countdown" id="countdown"></div>
  <div class="fade-to-black" id="fade-to-black"></div>
  <h1 class="mega-title" id="title">All your <span class="gradient-text multi-color">Agents</span>.<br>One <span class="gradient-text multi-color">Workspace</span>.</h1>
  <img src="assets/Claude_AI_symbol.svg" class="float-logo" id="claude-logo" alt="">
  <img src="assets/openai_logo_icon_248315.png" class="float-logo" id="openai-logo" alt="">
  <h2 class="end-card" id="endcard">100% <span class="gradient-text multi-color-end">Claude Code</span> and <span class="gradient-text multi-color-end">Codex</span> plan compatible</h2>
  <div class="brand-finale" id="brand-finale">
    <div class="finale-orb-wrap"><div class="finale-orb"></div></div>
    <span class="finale-text">Agent Workspace</span>
  </div>
  <div class="finale-subtitle" id="finale-subtitle">
    <span class="sub-text">Free & Open Source</span>
    <span class="sub-link">Link Below</span>
    <span class="sub-arrow">👇</span>
  </div>
  <div class="site-viewport" id="site-viewport">
    <div class="site-scroll-content" id="site-content">
      <iframe src="index-full.html" id="site-iframe" style="width:76.9vw;height:6150px;border:none;pointer-events:none;transform:scale(1.3);transform-origin:top left;"></iframe>
    </div>
  </div>
  <div class="trailer-container">
    <video class="trailer-video" id="trailer" muted playsinline>
      <source src="assets/trailer.mp4" type="video/mp4">
    </video>
  </div>
  <script src="script.js"></script>
  <script>
    const title = document.getElementById('title');
    const trailer = document.getElementById('trailer');
    const endcard = document.getElementById('endcard');
    const music = new Audio('assets/trailer-music.mp3');
    music.volume = 0.7;

    // Play button → 3s countdown → trailer starts
    document.getElementById('play-btn').addEventListener('click', () => {
      const btn = document.getElementById('play-btn');
      const cd = document.getElementById('countdown');
      btn.classList.add('hidden');

      // 3-2-1 countdown
      let count = 8;
      cd.textContent = count;
      cd.classList.add('visible');
      const countInterval = setInterval(() => {
        count--;
        if (count > 0) {
          cd.textContent = count;
        } else {
          clearInterval(countInterval);
          cd.classList.remove('visible');
          startTrailer();
        }
      }, 1000);
    });

    function startTrailer() {
      // Ambient lights pulse immediately
      document.querySelectorAll('.light').forEach(l => {
        l.style.opacity = '0.3';
        l.style.transition = 'opacity 1s ease';
      });
      setTimeout(() => {
        document.querySelectorAll('.light').forEach(l => l.style.opacity = '0.15');
      }, 1000);

      // Title + music together
      setTimeout(() => {
        music.play();
        title.classList.add('visible');
      }, 300);

      // 2.5s: title fades out
      setTimeout(() => {
        title.classList.remove('visible');
        title.classList.add('fade-out');
      }, 2500);

      // 3.5s: video fades in
      setTimeout(() => {
        trailer.classList.add('visible');
        trailer.play();
      }, 3500);

      // Corner zoom sequence
      const origins = ['top left', 'top right', 'bottom left', 'bottom right'];
      let lastZoomIndex = -1;
      trailer.addEventListener('timeupdate', () => {
        const t = trailer.currentTime;
        let zoomIndex = -1;
        if (t >= 0 && t < 0.7) zoomIndex = 0;
        else if (t >= 0.7 && t < 1.4) zoomIndex = 1;
        else if (t >= 1.4 && t < 2.1) zoomIndex = 2;
        else if (t >= 2.1 && t < 2.8) zoomIndex = 3;

        if (zoomIndex !== lastZoomIndex) {
          lastZoomIndex = zoomIndex;
          if (zoomIndex >= 0) {
            trailer.classList.add('zoomed');
            trailer.style.transformOrigin = origins[zoomIndex];
          } else {
            trailer.classList.remove('zoomed');
            trailer.style.transformOrigin = 'center center';
          }
        }
      });

      // After last zoom: fade out video, show end card
      let endTriggered = false;
      trailer.addEventListener('timeupdate', () => {
        if (!endTriggered && trailer.currentTime >= 3.3) {
          endTriggered = true;
          trailer.classList.remove('visible', 'zoomed');
          trailer.style.transformOrigin = 'center center';
          setTimeout(() => {
            endcard.classList.add('visible');
            document.querySelectorAll('.multi-color-end').forEach(el => el.classList.add('sweep'));
            document.getElementById('claude-logo').classList.add('claude-drift');
            document.getElementById('openai-logo').classList.add('openai-drift');

            // After end card, show website
            setTimeout(() => {
              endcard.style.transition = 'opacity 1s ease';
              endcard.style.opacity = '0';

              const viewport = document.getElementById('site-viewport');
              const content = document.getElementById('site-content');
              viewport.classList.add('visible');

              setTimeout(() => {
                content.style.setProperty('--scroll-distance', '-2500px');
                content.classList.add('scrolling');

                // After scroll, fade out site and show brand
                setTimeout(() => {
                  viewport.style.transition = 'opacity 0.8s ease';
                  viewport.style.opacity = '0';
                  setTimeout(() => {
                    const bf = document.getElementById('brand-finale');
                    bf.classList.add('visible');
                    bf.classList.add('expanded');

                    setTimeout(() => {
                      document.getElementById('finale-subtitle').classList.add('visible');
                    }, 800);

                    // Fade to black + music fade after brand holds
                    setTimeout(() => {
                      document.getElementById('fade-to-black').classList.add('visible');
                      let vol = music.volume;
                      const fadeMusic = setInterval(() => {
                        vol -= 0.05;
                        if (vol <= 0) {
                          clearInterval(fadeMusic);
                          music.pause();
                        } else {
                          music.volume = vol;
                        }
                      }, 100);
                    }, 4000);
                  }, 800);
                }, 6200);
              }, 500);
            }, 3100);
          }, 600);
        }
      });
    }
  </script>
</body>
</html>
