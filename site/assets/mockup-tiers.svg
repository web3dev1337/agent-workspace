<svg width="400" height="180" viewBox="0 0 400 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Tier system visualization -->
  <!-- T1 Focus -->
  <rect x="20" y="12" width="360" height="34" rx="6" fill="rgba(0,229,255,0.08)" stroke="rgba(0,229,255,0.3)" stroke-width="1"/>
  <rect x="28" y="20" width="28" height="18" rx="4" fill="rgba(0,229,255,0.25)"/>
  <text x="42" y="33" text-anchor="middle" font-family="monospace" font-weight="700" font-size="10" fill="#00e5ff">T1</text>
  <text x="66" y="33" font-family="sans-serif" font-weight="600" font-size="11" fill="#e5e7eb">Focus</text>
  <text x="200" y="33" font-family="sans-serif" font-size="9" fill="#9ca3af">Deep work — you interrupt for this</text>
  <circle cx="362" cy="29" r="5" fill="#10b981"/>

  <!-- T2 Review -->
  <rect x="20" y="54" width="360" height="34" rx="6" fill="rgba(37,99,235,0.06)" stroke="rgba(37,99,235,0.25)" stroke-width="1"/>
  <rect x="28" y="62" width="28" height="18" rx="4" fill="rgba(37,99,235,0.25)"/>
  <text x="42" y="75" text-anchor="middle" font-family="monospace" font-weight="700" font-size="10" fill="#2563eb">T2</text>
  <text x="66" y="75" font-family="sans-serif" font-weight="600" font-size="11" fill="#e5e7eb">Review</text>
  <text x="200" y="75" font-family="sans-serif" font-size="9" fill="#9ca3af">Gap fillers while T1 works</text>
  <circle cx="362" cy="71" r="5" fill="#ffbd2e"/>
  <circle cx="350" cy="71" r="5" fill="#10b981"/>

  <!-- T3 Background -->
  <rect x="20" y="96" width="360" height="34" rx="6" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <rect x="28" y="104" width="28" height="18" rx="4" fill="rgba(255,255,255,0.1)"/>
  <text x="42" y="117" text-anchor="middle" font-family="monospace" font-weight="700" font-size="10" fill="#9ca3af">T3</text>
  <text x="66" y="117" font-family="sans-serif" font-weight="600" font-size="11" fill="#e5e7eb">Background</text>
  <text x="200" y="117" font-family="sans-serif" font-size="9" fill="#9ca3af">Set-and-forget batch work</text>
  <circle cx="362" cy="113" r="5" fill="#10b981"/>
  <circle cx="350" cy="113" r="5" fill="#10b981"/>
  <circle cx="338" cy="113" r="5" fill="#ffbd2e"/>
  <circle cx="326" cy="113" r="5" fill="#10b981"/>

  <!-- T4 Overnight -->
  <rect x="20" y="138" width="360" height="34" rx="6" fill="rgba(255,255,255,0.01)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <rect x="28" y="146" width="28" height="18" rx="4" fill="rgba(255,255,255,0.06)"/>
  <text x="42" y="159" text-anchor="middle" font-family="monospace" font-weight="700" font-size="10" fill="#555">T4</text>
  <text x="66" y="159" font-family="sans-serif" font-weight="600" font-size="11" fill="#e5e7eb">Overnight</text>
  <text x="200" y="159" font-family="sans-serif" font-size="9" fill="#9ca3af">Long-running autonomous work</text>
  <circle cx="362" cy="155" r="5" fill="#2563eb"/>
</svg>
