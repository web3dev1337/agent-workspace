<svg width="400" height="180" viewBox="0 0 400 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Tier system visualization - using real app colors -->
  <!-- T1 Focus - GREEN -->
  <rect x="20" y="12" width="360" height="34" rx="6" fill="rgba(46,204,113,0.06)" stroke="rgba(46,204,113,0.4)" stroke-width="1"/>
  <rect x="28" y="20" width="28" height="18" rx="4" fill="rgba(46,204,113,0.25)"/>
  <text x="42" y="33" text-anchor="middle" font-family="monospace" font-weight="700" font-size="10" fill="rgba(46,204,113,0.95)">T1</text>
  <text x="66" y="33" font-family="sans-serif" font-weight="600" font-size="11" fill="#e5e7eb">Focus</text>
  <text x="370" y="33" text-anchor="end" font-family="sans-serif" font-size="9" fill="#9ca3af">Active deep work</text>

  <!-- T2 Secondary - BLUE -->
  <rect x="20" y="54" width="360" height="34" rx="6" fill="rgba(52,152,219,0.06)" stroke="rgba(52,152,219,0.4)" stroke-width="1"/>
  <rect x="28" y="62" width="28" height="18" rx="4" fill="rgba(52,152,219,0.25)"/>
  <text x="42" y="75" text-anchor="middle" font-family="monospace" font-weight="700" font-size="10" fill="rgba(52,152,219,0.95)">T2</text>
  <text x="66" y="75" font-family="sans-serif" font-weight="600" font-size="11" fill="#e5e7eb">Secondary</text>
  <text x="370" y="75" text-anchor="end" font-family="sans-serif" font-size="9" fill="#9ca3af">Runs alongside T1</text>

  <!-- T3 Background - YELLOW -->
  <rect x="20" y="96" width="360" height="34" rx="6" fill="rgba(241,196,15,0.04)" stroke="rgba(241,196,15,0.3)" stroke-width="1"/>
  <rect x="28" y="104" width="28" height="18" rx="4" fill="rgba(241,196,15,0.2)"/>
  <text x="42" y="117" text-anchor="middle" font-family="monospace" font-weight="700" font-size="10" fill="rgba(241,196,15,0.95)">T3</text>
  <text x="66" y="117" font-family="sans-serif" font-weight="600" font-size="11" fill="#e5e7eb">Background</text>
  <text x="370" y="117" text-anchor="end" font-family="sans-serif" font-size="9" fill="#9ca3af">Set and forget</text>

  <!-- T4 Overnight - RED -->
  <rect x="20" y="138" width="360" height="34" rx="6" fill="rgba(231,76,60,0.04)" stroke="rgba(231,76,60,0.25)" stroke-width="1"/>
  <rect x="28" y="146" width="28" height="18" rx="4" fill="rgba(231,76,60,0.2)"/>
  <text x="42" y="159" text-anchor="middle" font-family="monospace" font-weight="700" font-size="10" fill="rgba(231,76,60,0.95)">T4</text>
  <text x="66" y="159" font-family="sans-serif" font-weight="600" font-size="11" fill="#e5e7eb">Overnight</text>
  <text x="370" y="159" text-anchor="end" font-family="sans-serif" font-size="9" fill="#9ca3af">Long-running autonomous</text>
</svg>
